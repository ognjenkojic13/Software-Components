server:
  port: 8082

spring:
  application:
    name: session-service
  datasource:
    url: jdbc:mysql://localhost:3306/session_service_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true
    username: gaming_app
    password: gaming_app_pw
  jpa:
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQL8Dialect
    show-sql: false
  activemq:
    broker-url: tcp://localhost:61616
    user: admin
    password: admin

eureka:
  client:
    service-url:
      defaultZone: http://localhost:8761/eureka/
  instance:
    prefer-ip-address: true

app:
  internal-secret: internal-service-secret-change-me

ribbon:
  eureka:
    enabled: true
